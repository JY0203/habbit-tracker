<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Habits">
<meta name="theme-color" content="#3f9d6b">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-180.png">
<title>Habit Tracker</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  :root {
    --bg: #faf9f6; --surface: #ffffff; --surface-2: #f3f2ec;
    --border: rgba(0,0,0,0.08); --border-strong: rgba(0,0,0,0.14);
    --text: #1a1a17; --text-2: #5c5b54; --text-3: #94938a;
    --accent: #3f9d6b; --accent-weak: #e7f3ec; --accent-text: #2e7c52;
    --danger: #d4514e;
    --radius: 16px; --radius-sm: 11px;
    --grid-line: #e8e7df;
    --shadow: 0 1px 2px rgba(0,0,0,0.04), 0 4px 16px rgba(0,0,0,0.03);
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #121211; --surface: #1c1c1a; --surface-2: #262522;
      --border: rgba(255,255,255,0.08); --border-strong: rgba(255,255,255,0.16);
      --text: #f0efe9; --text-2: #b7b6ac; --text-3: #807e74;
      --accent: #56b885; --accent-weak: #18352663; --accent-text: #74c79b;
      --danger: #e0625f;
      --grid-line: #2c2b28;
      --shadow: 0 1px 2px rgba(0,0,0,0.2), 0 4px 16px rgba(0,0,0,0.18);
    }
  }
  @media (prefers-reduced-motion: reduce) { * { transition: none !important; animation: none !important; } }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang TC", "Noto Sans TC", Helvetica, sans-serif;
    background: var(--bg); color: var(--text);
    min-height: 100vh;
    padding: env(safe-area-inset-top) 0 calc(env(safe-area-inset-bottom) + 24px);
    -webkit-font-smoothing: antialiased;
  }
  .wrap { max-width: 560px; margin: 0 auto; padding: 0 18px; }
  @media (min-width: 820px) {
    .wrap { max-width: 920px; padding: 0 28px; }
    .hero-day { font-size: 40px; }
    .hero-ring, .hero-ring canvas { width: 84px; height: 84px; }
  }

  /* Top bar */
  .topbar { display: flex; align-items: center; justify-content: space-between; padding: 22px 0 14px; }
  .brand { font-size: 12px; font-weight: 600; letter-spacing: 0.16em; text-transform: uppercase; color: var(--text-3); }
  .tabs { display: inline-flex; background: var(--surface-2); border-radius: 10px; padding: 3px; gap: 2px; }
  .tab { border: none; background: none; font-family: inherit; font-size: 13px; font-weight: 500;
    color: var(--text-2); padding: 6px 14px; border-radius: 8px; cursor: pointer; transition: all 0.15s; }
  .tab.active { background: var(--surface); color: var(--text); box-shadow: var(--shadow); }

  /* ===== TODAY VIEW ===== */
  .hero { display: flex; align-items: center; gap: 18px; padding: 8px 4px 22px; }
  .hero-date { flex: 1; }
  .hero-eyebrow { font-size: 13px; color: var(--text-3); font-weight: 500; margin-bottom: 2px; }
  .hero-day { font-size: 34px; font-weight: 600; letter-spacing: -0.02em; line-height: 1.05; }
  .hero-ring { position: relative; width: 72px; height: 72px; flex-shrink: 0; }
  .hero-ring canvas { width: 72px; height: 72px; }
  .hero-ring-label { position: absolute; inset: 0; display: flex; flex-direction: column;
    align-items: center; justify-content: center; }
  .hero-ring-frac { font-size: 16px; font-weight: 600; letter-spacing: -0.02em; }

  .habit-list { display: grid; grid-template-columns: 1fr; gap: 10px; }
  @media (min-width: 820px) { .habit-list { grid-template-columns: 1fr 1fr; gap: 12px; } }
  .habit-card { display: flex; align-items: center; gap: 14px; background: var(--surface);
    border: 0.5px solid var(--border); border-radius: var(--radius); padding: 16px 18px;
    box-shadow: var(--shadow); cursor: pointer; transition: transform 0.12s, border-color 0.15s;
    user-select: none; }
  .habit-card:active { transform: scale(0.985); }
  .habit-card.done { border-color: var(--accent); background: var(--accent-weak); }
  .habit-info { flex: 1; min-width: 0; }
  .habit-name { font-size: 16px; font-weight: 600; letter-spacing: -0.01em;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .habit-meta { font-size: 12.5px; color: var(--text-3); margin-top: 3px; display: flex; align-items: center; gap: 5px; }
  .habit-meta .streak { color: var(--accent-text); font-weight: 600; }
  .check-btn { width: 34px; height: 34px; border-radius: 50%; border: 2px solid var(--border-strong);
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    transition: all 0.18s cubic-bezier(.3,1.4,.5,1); background: transparent; }
  .habit-card.done .check-btn { background: var(--accent); border-color: var(--accent); transform: scale(1.06); }
  .check-btn i { font-size: 18px; color: #fff; opacity: 0; transform: scale(0.4); transition: all 0.18s cubic-bezier(.3,1.4,.5,1); }
  .habit-card.done .check-btn i { opacity: 1; transform: scale(1); }
  .del-btn { width: 30px; height: 30px; border-radius: 50%; border: none; background: var(--surface-2);
    color: var(--danger); display: none; align-items: center; justify-content: center;
    cursor: pointer; flex-shrink: 0; font-size: 16px; }
  body.editing .del-btn { display: flex; }
  body.editing .check-btn { display: none; }
  body.editing .habit-card { cursor: default; }
  body.editing .habit-card:active { transform: none; }
  .rename-input { font-family: inherit; font-size: 16px; font-weight: 600; color: var(--text);
    background: var(--surface-2); border: 1.5px solid var(--accent); border-radius: 8px;
    padding: 7px 10px; width: 100%; outline: none; letter-spacing: -0.01em; }

  .add-row { display: flex; gap: 8px; margin-top: 16px; }
  .add-btn { flex: 1; border: 1.5px dashed var(--border-strong); background: none; border-radius: var(--radius);
    padding: 14px; color: var(--text-2); font-family: inherit; font-size: 14px; font-weight: 500;
    cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px; transition: all 0.15s; }
  .add-btn:hover { border-color: var(--accent); color: var(--accent-text); }
  .edit-toggle { border: 1.5px solid var(--border); background: var(--surface); border-radius: var(--radius);
    padding: 14px 18px; color: var(--text-2); font-family: inherit; font-size: 14px; font-weight: 500; cursor: pointer; }
  body.editing .edit-toggle { background: var(--accent); color: #fff; border-color: var(--accent); }

  /* Inline add form */
  .add-form { display: none; gap: 8px; margin-top: 12px; }
  .add-form.show { display: flex; }
  .add-form input { flex: 1; border: 1.5px solid var(--accent); background: var(--surface);
    border-radius: var(--radius-sm); padding: 13px 16px; font-family: inherit; font-size: 15px; color: var(--text); outline: none; }
  .add-form button { border: none; background: var(--accent); color: #fff; border-radius: var(--radius-sm);
    padding: 0 20px; font-family: inherit; font-size: 14px; font-weight: 600; cursor: pointer; }

  .empty { text-align: center; padding: 60px 20px; }
  .empty-icon { font-size: 40px; color: var(--text-3); margin-bottom: 14px; }
  .empty-title { font-size: 17px; font-weight: 600; margin-bottom: 6px; }
  .empty-sub { font-size: 14px; color: var(--text-3); line-height: 1.5; }

  /* ===== HISTORY VIEW ===== */
  .hist-head { display: flex; align-items: center; justify-content: space-between; padding: 8px 0 18px; }
  .month-nav { display: flex; align-items: center; gap: 8px; }
  .nav-btn { width: 32px; height: 32px; border-radius: 9px; border: 0.5px solid var(--border-strong);
    background: var(--surface); color: var(--text-2); cursor: pointer; display: flex;
    align-items: center; justify-content: center; font-size: 16px; }
  .nav-btn:hover { background: var(--surface-2); }
  .month-title { font-size: 17px; font-weight: 600; min-width: 130px; text-align: center; letter-spacing: -0.01em; }
  .clear-btn { border: 0.5px solid var(--border); background: var(--surface); color: var(--text-3);
    border-radius: 9px; padding: 6px 12px; font-family: inherit; font-size: 12.5px; cursor: pointer;
    display: flex; align-items: center; gap: 4px; }
  .clear-btn:hover { color: var(--danger); border-color: var(--danger); }

  .stat-strip { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 16px; }
  .stat { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius-sm); padding: 12px 14px; }
  .stat-label { font-size: 11.5px; color: var(--text-3); margin-bottom: 4px; }
  .stat-value { font-size: 21px; font-weight: 600; letter-spacing: -0.02em; }

  .grid-card { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius);
    padding: 14px; overflow-x: auto; margin-bottom: 14px; box-shadow: var(--shadow); }
  table { border-collapse: collapse; width: 100%; }
  .col-habit { text-align: left; min-width: 92px; max-width: 120px; padding: 6px 10px 6px 2px;
    font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .col-day { width: 21px; min-width: 21px; text-align: center; }
  .row-date th { font-size: 10px; font-weight: 500; color: var(--text-3); padding-bottom: 7px; text-align: center; }
  .today-h { color: var(--accent-text) !important; font-weight: 700 !important; }
  .habit-row td { border-top: 0.5px solid var(--grid-line); padding: 3px 0; }
  .cb { width: 16px; height: 16px; border: 1.5px solid var(--border-strong); border-radius: 4px;
    cursor: pointer; margin: 2px auto; display: flex; align-items: center; justify-content: center;
    background: var(--surface-2); transition: all 0.1s; }
  .cb.checked { background: var(--accent); border-color: var(--accent); }
  .cb.checked::after { content: ''; width: 4px; height: 8px; border: 2px solid #fff;
    border-top: none; border-left: none; transform: rotate(45deg) translateY(-1px); }
  .cb.future { opacity: 0.28; pointer-events: none; }
  .cb.today-ring { border-color: var(--accent); }
  .pct-cell { font-size: 11px; color: var(--text-3); padding-left: 8px; text-align: right; min-width: 32px; white-space: nowrap; font-weight: 500; }

  .chart-card { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius);
    padding: 18px; box-shadow: var(--shadow); }
  .chart-title { font-size: 13px; font-weight: 600; color: var(--text-2); margin-bottom: 14px; }
  .bar-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
  .bar-row:last-child { margin-bottom: 0; }
  .bar-label { font-size: 13px; width: 88px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex-shrink: 0; font-weight: 500; }
  .bar-track { flex: 1; height: 8px; background: var(--grid-line); border-radius: 5px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 5px; background: var(--accent); transition: width 0.4s cubic-bezier(.2,.8,.2,1); }
  .bar-pct { font-size: 12px; color: var(--text-3); width: 34px; text-align: right; flex-shrink: 0; font-weight: 600; }

  .hidden { display: none !important; }
</style>
</head>
<body>
<div class="wrap">
  <div class="topbar">
    <div class="brand">Habit Tracker</div>
    <div class="tabs">
      <button class="tab active" id="tabToday" onclick="switchView('today')">今天</button>
      <button class="tab" id="tabHist" onclick="switchView('hist')">紀錄</button>
    </div>
  </div>

  <!-- TODAY -->
  <section id="todayView">
    <div class="hero" id="hero"></div>
    <div id="todayBody"></div>
  </section>

  <!-- HISTORY -->
  <section id="histView" class="hidden">
    <div class="hist-head">
      <div class="month-nav">
        <button class="nav-btn" onclick="changeMonth(-1)" aria-label="上個月"><i class="ti ti-chevron-left"></i></button>
        <div class="month-title" id="monthTitle"></div>
        <button class="nav-btn" onclick="changeMonth(1)" aria-label="下個月"><i class="ti ti-chevron-right"></i></button>
      </div>
      <button class="clear-btn" onclick="clearData()"><i class="ti ti-trash"></i> 清除</button>
    </div>
    <div class="stat-strip" id="statStrip"></div>
    <div class="grid-card"><table id="histTable"></table></div>
    <div class="chart-card">
      <div class="chart-title">各習慣完成率</div>
      <div id="barCharts"></div>
    </div>
  </section>
</div>

<script>
const DAYS_TW = ['日','一','二','三','四','五','六'];
const MONTH_NAMES = ['一月','二月','三月','四月','五月','六月','七月','八月','九月','十月','十一月','十二月'];
const LS_KEY = 'habit_tracker_v2';

let state = { habits: [], data: {}, year: 0, month: 0 };
let view = 'today';
let editing = false;
let addingOpen = false;

function load() {
  const now = new Date();
  state.year = now.getFullYear(); state.month = now.getMonth();
  try {
    const saved = JSON.parse(localStorage.getItem(LS_KEY) || 'null');
    if (saved) { state.habits = saved.habits || []; state.data = saved.data || {}; }
  } catch(e) {}
  render();
}
function save() { localStorage.setItem(LS_KEY, JSON.stringify({ habits: state.habits, data: state.data })); }

// date helpers
function getDays(y, m) { return new Date(y, m+1, 0).getDate(); }
function keyFor(y, m, d, h) { return `${y}-${m}-${d}-${h}`; }
function checkedOn(y, m, d, h) { return !!state.data[keyFor(y,m,d,h)]; }
function toggleOn(y, m, d, h) { const k = keyFor(y,m,d,h); state.data[k] = !state.data[k]; save(); render(); }

// streak: consecutive completed days ending today (today optional)
function streakOf(habit) {
  const now = new Date();
  let d = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  if (!checkedOn(d.getFullYear(), d.getMonth(), d.getDate(), habit)) {
    d.setDate(d.getDate() - 1); // allow today not-yet-done
  }
  let s = 0;
  while (checkedOn(d.getFullYear(), d.getMonth(), d.getDate(), habit)) {
    s++; d.setDate(d.getDate() - 1);
  }
  return s;
}

function switchView(v) {
  view = v;
  document.getElementById('todayView').classList.toggle('hidden', v !== 'today');
  document.getElementById('histView').classList.toggle('hidden', v !== 'hist');
  document.getElementById('tabToday').classList.toggle('active', v === 'today');
  document.getElementById('tabHist').classList.toggle('active', v === 'hist');
  if (v === 'today') { editing = false; document.body.classList.remove('editing'); }
  render();
}

function changeMonth(delta) {
  state.month += delta;
  if (state.month > 11) { state.month = 0; state.year++; }
  if (state.month < 0)  { state.month = 11; state.year--; }
  render();
}

function openAdd() { addingOpen = true; render(); setTimeout(() => { const i = document.getElementById('addInput'); if (i) i.focus(); }, 30); }
function confirmAdd() {
  const i = document.getElementById('addInput');
  if (i && i.value.trim()) { state.habits.push(i.value.trim()); save(); }
  addingOpen = false; render();
}
function addKey(e) { if (e.key === 'Enter') confirmAdd(); if (e.key === 'Escape') { addingOpen = false; render(); } }
function toggleEdit() { editing = !editing; document.body.classList.toggle('editing', editing); render(); }
function deleteHabit(idx) {
  if (!confirm(`刪除「${state.habits[idx]}」？該習慣的紀錄會一併移除。`)) return;
  state.habits.splice(idx, 1); save(); render();
}

function escAttr(s) {
  return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// rename a habit and migrate its check history to the new name
function renameHabit(idx, raw) {
  const newName = (raw || '').trim();
  const oldName = state.habits[idx];
  if (!newName || newName === oldName) { render(); return; }
  if (state.habits.includes(newName)) { alert('已有相同名稱的習慣'); render(); return; }
  const suffix = '-' + oldName;
  const migrated = {};
  for (const k in state.data) {
    if (k.endsWith(suffix)) {
      migrated[k.slice(0, k.length - suffix.length) + '-' + newName] = state.data[k];
    } else {
      migrated[k] = state.data[k];
    }
  }
  state.data = migrated;
  state.habits[idx] = newName;
  save(); render();
}

// re-render when the calendar day changes (app left open across midnight)
let lastDay = new Date().toDateString();
function checkDayRollover() {
  const now = new Date().toDateString();
  if (now !== lastDay) { lastDay = now; render(); }
}
document.addEventListener('visibilitychange', () => { if (!document.hidden) checkDayRollover(); });
setInterval(checkDayRollover, 60000);
function clearData() {
  if (!confirm('清除所有習慣與紀錄？此動作無法復原。')) return;
  state.habits = []; state.data = {}; save(); render();
}

function render() { view === 'today' ? renderToday() : renderHistory(); }

function renderToday() {
  const now = new Date();
  const y = now.getFullYear(), m = now.getMonth(), d = now.getDate();
  const done = state.habits.filter(h => checkedOn(y,m,d,h)).length;
  const total = state.habits.length;
  const pct = total ? Math.round(done/total*100) : 0;

  document.getElementById('hero').innerHTML = `
    <div class="hero-date">
      <div class="hero-eyebrow">星期${DAYS_TW[now.getDay()]}</div>
      <div class="hero-day">${m+1}月${d}日</div>
    </div>
    <div class="hero-ring">
      <canvas id="heroRing" width="72" height="72"></canvas>
      <div class="hero-ring-label"><div class="hero-ring-frac">${done}/${total}</div></div>
    </div>`;
  drawRing('heroRing', pct);

  const body = document.getElementById('todayBody');
  if (total === 0) {
    body.innerHTML = `
      <div class="empty">
        <div class="empty-icon"><i class="ti ti-seeding"></i></div>
        <div class="empty-title">開始追蹤你的第一個習慣</div>
        <div class="empty-sub">新增任何你想養成的習慣，<br>每天點一下卡片就能打卡。</div>
      </div>
      <div class="add-form ${addingOpen?'show':''}">
        <input id="addInput" placeholder="例如：喝水、運動、閱讀…" onkeydown="addKey(event)">
        <button onclick="confirmAdd()">新增</button>
      </div>
      <div class="add-row ${addingOpen?'hidden':''}">
        <button class="add-btn" onclick="openAdd()"><i class="ti ti-plus"></i> 新增習慣</button>
      </div>`;
    return;
  }

  let cards = state.habits.map((h, i) => {
    const isDone = checkedOn(y,m,d,h);
    const st = streakOf(h);
    const meta = st > 0 ? `<span class="streak"><i class="ti ti-flame"></i> 連續 ${st} 天</span>`
                        : `<span>今天還沒打卡</span>`;
    const nameHTML = editing
      ? `<input class="rename-input" value="${escAttr(h)}" onclick="event.stopPropagation()" onkeydown="if(event.key==='Enter')this.blur()" onchange="renameHabit(${i}, this.value)">`
      : `<div class="habit-name">${h}</div>
         <div class="habit-meta">${isDone?'<span class="streak"><i class="ti ti-check"></i> 今天完成</span>':meta}</div>`;
    return `<div class="habit-card ${isDone?'done':''}" onclick="${editing?'':`toggleOn(${y},${m},${d},'${h.replace(/'/g,"\\'")}')`}">
      <div class="habit-info">${nameHTML}</div>
      <div class="check-btn"><i class="ti ti-check"></i></div>
      <button class="del-btn" onclick="event.stopPropagation();deleteHabit(${i})"><i class="ti ti-x"></i></button>
    </div>`;
  }).join('');

  body.innerHTML = `
    <div class="habit-list">${cards}</div>
    <div class="add-form ${addingOpen?'show':''}">
      <input id="addInput" placeholder="新習慣名稱…" onkeydown="addKey(event)">
      <button onclick="confirmAdd()">新增</button>
    </div>
    <div class="add-row ${addingOpen?'hidden':''}">
      <button class="add-btn" onclick="openAdd()"><i class="ti ti-plus"></i> 新增習慣</button>
      <button class="edit-toggle" onclick="toggleEdit()">${editing?'完成':'編輯'}</button>
    </div>`;
}

function renderHistory() {
  const now = new Date();
  const isCur = now.getFullYear()===state.year && now.getMonth()===state.month;
  const today = now.getDate();
  const days = getDays(state.year, state.month);

  document.getElementById('monthTitle').textContent = `${state.year} / ${MONTH_NAMES[state.month]}`;

  // denominator = total days in the displayed month (monthly progress)
  const denomFor = () => days;
  const numerFor = h => { let c=0; for (let d=1; d<=days; d++) if (checkedOn(state.year,state.month,d,h)) c++; return c; };
  let totalNum = 0, totalDen = 0;
  state.habits.forEach(h => { totalNum += numerFor(h); totalDen += denomFor(h); });
  const overall = totalDen ? Math.round(totalNum/totalDen*100) : 0;
  const bestStreak = state.habits.reduce((mx,h)=>Math.max(mx, streakOf(h)), 0);

  document.getElementById('statStrip').innerHTML = `
    <div class="stat"><div class="stat-label">本月完成率</div><div class="stat-value">${overall}%</div></div>
    <div class="stat"><div class="stat-label">最長連續</div><div class="stat-value">${bestStreak}<span style="font-size:13px;color:var(--text-3);font-weight:500;"> 天</span></div></div>
    <div class="stat"><div class="stat-label">習慣數量</div><div class="stat-value">${state.habits.length}</div></div>`;

  const table = document.getElementById('histTable');
  if (state.habits.length === 0) {
    table.innerHTML = `<tr><td style="text-align:center;padding:28px;color:var(--text-3);font-size:13px;">還沒有資料，先到「今天」新增習慣</td></tr>`;
    document.getElementById('barCharts').innerHTML = '';
    return;
  }

  let html = `<thead><tr class="row-date"><th class="col-habit" style="color:var(--text-3);font-size:11px;font-weight:600;">HABITS</th>`;
  for (let d=1; d<=days; d++) {
    const dow = new Date(state.year, state.month, d).getDay();
    html += `<th class="col-day ${isCur&&d===today?'today-h':''}">${d}<br><span style="font-size:9px;color:var(--text-3);">${DAYS_TW[dow]}</span></th>`;
  }
  html += `<th class="pct-cell">%</th></tr></thead><tbody>`;
  state.habits.forEach(h => {
    let c = 0;
    html += `<tr class="habit-row"><td class="col-habit" title="${h}">${h}</td>`;
    for (let d=1; d<=days; d++) {
      const future = isCur && d > today;
      const chk = checkedOn(state.year,state.month,d,h);
      if (chk) c++;
      const cls = ['cb', chk?'checked':'', future?'future':'', (isCur&&d===today&&!chk)?'today-ring':''].filter(Boolean).join(' ');
      html += `<td><div class="${cls}" onclick="toggleOn(${state.year},${state.month},${d},'${h.replace(/'/g,"\\'")}')"></div></td>`;
    }
    const den = denomFor();
    const pct = den ? Math.round(c/den*100) : 0;
    html += `<td class="pct-cell">${pct}%</td></tr>`;
  });
  html += `</tbody>`;
  table.innerHTML = html;

  document.getElementById('barCharts').innerHTML = state.habits.map(h => {
    const c = numerFor(h), den = denomFor();
    const pct = den ? Math.round(c/den*100) : 0;
    return `<div class="bar-row">
      <div class="bar-label" title="${h}">${h}</div>
      <div class="bar-track"><div class="bar-fill" style="width:${pct}%"></div></div>
      <div class="bar-pct">${pct}%</div></div>`;
  }).join('');
}

function drawRing(id, pct) {
  const cv = document.getElementById(id); if (!cv) return;
  const dpr = window.devicePixelRatio || 1;
  const size = cv.clientWidth || 72;
  cv.width = size * dpr; cv.height = size * dpr;
  const ctx = cv.getContext('2d');
  ctx.scale(dpr, dpr);
  const cs = getComputedStyle(document.documentElement);
  const track = cs.getPropertyValue('--grid-line').trim() || '#e8e7df';
  const fill = cs.getPropertyValue('--accent').trim() || '#3f9d6b';
  const c = size/2, r = size/2 - 6, w = 6;
  ctx.clearRect(0,0,size,size);
  ctx.beginPath(); ctx.arc(c,c,r,0,Math.PI*2); ctx.strokeStyle = track; ctx.lineWidth = w; ctx.stroke();
  if (pct > 0) {
    ctx.beginPath(); ctx.arc(c,c,r,-Math.PI/2,-Math.PI/2+(pct/100)*Math.PI*2);
    ctx.strokeStyle = fill; ctx.lineWidth = w; ctx.lineCap = 'round'; ctx.stroke();
  }
}

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => navigator.serviceWorker.register('sw.js').catch(()=>{}));
}
load();
</script>
